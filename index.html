<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RaceMates Mission Control v4.1</title>
    <style>
        :root { 
            --gold-primary: #D4AF37; /* Base Gold */
            --gold-highlight: #F4C430; /* Bright Gold */
            --gold-dark: #8A6E0F; /* Dark Gold/Shadow */
            --bg-dark: #0a0a0a; 
            --carbon-base: #111;
        }
        
        /* Carbon Fiber Background Pattern */
        body { 
            background-color: var(--bg-dark); 
            background-image: 
                linear-gradient(45deg, #111 25%, transparent 25%, transparent 75%, #111 75%, #111),
                linear-gradient(45deg, #111 25%, transparent 25%, transparent 75%, #111 75%, #111);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }

        .container { 
            width: 100%; 
            max-width: 480px; /* Mobile focused max-width based on screenshot */
            /* Glassmorphism over Carbon */
            background: rgba(20, 20, 20, 0.95); 
            border: 1px solid var(--gold-dark); 
            border-radius: 20px; 
            padding: 20px; 
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.15); 
            box-sizing: border-box;
        }

        header { 
            border-bottom: 2px solid var(--gold-primary); 
            margin-bottom: 20px; 
            padding-bottom: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
        }

        h1 { 
            margin: 0; 
            font-size: 1.1rem; 
            letter-spacing: 1px; 
            text-transform: uppercase; 
            color: #fff;
            font-weight: 700;
        }

        .subtitle {
            font-size: 0.65rem; 
            color: var(--gold-primary); 
            letter-spacing: 1px;
            margin-top: 4px;
            text-transform: uppercase;
        }

        .logo-container {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--gold-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
            background: #000;
        }
        
        .logo-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .section-title { 
            width: 100%; 
            margin: 10px 0 15px 0; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            color: var(--gold-primary); 
            font-weight: bold;
        }

        .card { 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-left: 3px solid var(--gold-primary); /* Gold Accent Left */
            border-radius: 12px; 
            padding: 20px; 
            background: #151515;
            margin-bottom: 15px;
            position: relative;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .card-icon {
            font-size: 1.2rem;
        }

        .card-title { 
            font-size: 0.95rem; 
            font-weight: 600;
            color: #fff; 
        }

        /* Large Metrics */
        .metric-large { 
            font-size: 2.5rem; 
            font-weight: 700; 
            color: #fff;
            margin-bottom: 5px;
            line-height: 1;
        }
        .metric-sub { 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            color: #666; 
            letter-spacing: 1px; 
            margin-bottom: 5px;
        }
        .metric-detail {
            font-size: 0.8rem;
            color: #888;
        }

        /* Cost Table */
        .cost-row { 
            display: flex; 
            justify-content: space-between; 
            padding: 6px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            font-size: 0.9rem;
            color: #ccc;
        }
        .cost-row:last-child { border-bottom: none; }
        .cost-val { font-weight: 500; color: #fff; }

        /* Spotlight Profile */
        .spotlight-container {
            display: flex;
            align-items: center;
            background: #222;
            border-radius: 8px;
            padding: 10px;
            margin-top: 10px;
        }
        
        .spotlight-img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--gold-primary);
            object-fit: cover;
            margin-right: 15px;
        }
        
        .spotlight-info { flex: 1; }
        .spotlight-name { font-weight: bold; font-size: 0.95rem; color: #fff; }
        .spotlight-team { font-size: 0.75rem; color: var(--gold-primary); }
        .spotlight-arrow { color: #555; font-size: 1.2rem; }

        .footer { 
            margin-top: 20px; 
            font-size: 0.7rem; 
            color: #444; 
            text-align: center; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>Mission Control</h1>
                <div class="subtitle">Mitchi Enterprise v4.1</div>
            </div>
            <div class="logo-container">
                <img src="/public/assets/racemates_logo_gold.jpg" class="logo-img" alt="R">
            </div>
        </header>
        
        <div class="section-title">Live Status</div>
        
        <!-- CARD 1: DRIVER DATABASE -->
        <div class="card">
            <div class="card-header">
                <span class="card-icon">🏎️</span>
                <span class="card-title">Driver Database</span>
            </div>
            <div class="metric-large" id="driver-count">108</div>
            <div class="metric-sub">Active Profiles</div>
            <div class="metric-detail">Pending Scans: <span id="driver-pending" style="color:var(--gold-primary)">0</span></div>
        </div>

        <!-- CARD 2: BUDGET -->
        <div class="card">
            <div class="card-header">
                <span class="card-icon">💰</span>
                <span class="card-title">Budget (Feb)</span>
            </div>
            <div class="metric-large" style="color: #F4C430;" id="total-cost">€ 145.20</div>
            <div class="metric-sub" style="margin-bottom: 15px;">Monthly Burn Rate</div>
            
            <div id="cost-list">
                <!-- Populated via JS -->
            </div>
        </div>

        <!-- CARD 3: SPOTLIGHT -->
        <div class="card">
            <div class="card-header">
                <span class="card-icon">👤</span>
                <span class="card-title">Spotlight</span>
            </div>
            <a href="profile_LINK.html" style="text-decoration:none;">
                <div class="spotlight-container" id="spotlight-content">
                    <!-- Populated via JS -->
                    <div style="padding:10px; color:#666;">Loading...</div>
                </div>
            </a>
            <div style="font-size: 0.7rem; text-align: center; margin-top: 8px; color: #555;">Tap to view details</div>
        </div>

        <div class="footer">
            Recent Productions &bull; Mitchi Systems
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                // In a real scenario, fetch from JSON. For this static restore, we use the values from the screenshot.
                const status = { drivers_active: "108", drivers_pending: "0" };
                const cost = { 
                    total_monthly_burn: "€ 145.20",
                    api_costs: {
                        "Openai": "€ 42.50",
                        "Google": "€ 12.10",
                        "Hostinger": "€ 14.99",
                        "Twilio": "€ 8.50"
                    }
                };
                const profile = {
                    name: "Mick Schumacher",
                    team: "Alpine Endurance Team",
                    image: "/public/assets/drivers/mick_real.jpg"
                };

                // Drivers
                document.getElementById('driver-count').innerText = status.drivers_active;
                document.getElementById('driver-pending').innerText = status.drivers_pending;

                // Costs
                document.getElementById('total-cost').innerText = cost.total_monthly_burn;
                let costHtml = '';
                for (const [k, v] of Object.entries(cost.api_costs)) {
                    costHtml += `<div class="cost-row"><span>${k}</span><span class="cost-val">${v}</span></div>`;
                }
                document.getElementById('cost-list').innerHTML = costHtml;

                // Spotlight
                document.getElementById('spotlight-content').innerHTML = `
                    <img src="${profile.image}" class="spotlight-img" onerror="this.src='https://via.placeholder.com/50/000/fff?text=Mick'">
                    <div class="spotlight-info">
                        <div class="spotlight-name">${profile.name}</div>
                        <div class="spotlight-team">${profile.team}</div>
                    </div>
                    <div class="spotlight-arrow">›</div>
                `;

            } catch (e) { console.error(e); }
        }
        
        loadData();
    </script>
</body>
</html>
